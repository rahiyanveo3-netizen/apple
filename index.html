<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Druto Cash</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Google Sans',sans-serif;
}

body{
    background:#fff;
    color:#202124;
    max-width:500px;
    margin:auto;
    padding-bottom:20px;
}

.container{
    padding:20px;
}

.app-title{
    font-size:48px;
    font-weight:400;
    margin-top:20px;
}

.app-info{
    display:flex;
    align-items:center;
    margin-top:25px;
}

.app-icon{
    width:95px;
    height:95px;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.app-icon img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.stats{
    flex:1;
    display:flex;
    justify-content:space-around;
    margin-left:15px;
}

.stat{
    text-align:center;
}

.stat .big{
    font-size:22px;
    font-weight:700;
}

.stat .small{
    font-size:15px;
    color:#5f6368;
    margin-top:5px;
}

.install-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:30px;
    background:#0b57d0;
    color:#fff;
    font-size:24px;
    font-weight:500;
    margin-top:25px;
    cursor:pointer;
}

.install-btn:hover{
    background:#0846ab;
}

.screenshots{
    display:flex;
    gap:12px;
    overflow-x:auto;
    margin-top:25px;
    scrollbar-width:none;
}

.screenshots::-webkit-scrollbar{
    display:none;
}

.shot{
    min-width:160px;
    height:300px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #e0e0e0;
    flex-shrink:0;
}

.shot img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.section{
    margin-top:40px;
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.section-header h2{
    font-size:20px;
    font-weight:500;
}

.arrow{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#f1f3f4;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.about-text{
    margin-top:18px;
    font-size:18px;
    line-height:1.6;
    color:#3c4043;
}

.tag{
    display:inline-block;
    border:1px solid #dadce0;
    padding:12px 25px;
    border-radius:14px;
    margin-top:25px;
    font-size:20px;
}

.rating-box{
    display:flex;
    gap:20px;
    margin-top:25px;
}

.rating-left{
    width:120px;
}

.rating-left h1{
    font-size:90px;
    font-weight:400;
}

.stars{
    color:#1a73e8;
    font-size:24px;
}

.rating-right{
    flex:1;
}

.bar-row{
    display:flex;
    align-items:center;
    margin-bottom:12px;
}

.bar-row span{
    width:20px;
}

.bar{
    flex:1;
    height:12px;
    background:#e0e0e0;
    border-radius:20px;
    overflow:hidden;
    margin-left:10px;
}

.fill{
    height:100%;
    background:#1a73e8;
}
</style>
</head>
<body>

<div class="container">

<h1 class="app-title">Druto Cash</h1>

<div class="app-info">

<div class="app-icon">
<img src="/logo.png" alt="">
</div>

<div class="stats">

<div class="stat">
<div class="big">4.4 ★</div>
<div class="small">14k reviews</div>
</div>

<div class="stat">
<div class="big">500k+</div>
<div class="small">Downloads</div>
</div>

<div class="stat">
<div class="big">3+</div>
<div class="small">Rated</div>
</div>

</div>
</div>

<button class="install-btn">Install</button>

<div class="screenshots">

<div class="shot">
<img src="/1.jpg">
</div>

<div class="shot">
<img src="/2.jpg">
</div>

<div class="shot">
<img src="/3.jpg">
</div>

<div class="shot">
<img src="/4.jpg">
</div>

</div>

<div class="section">

<div class="section-header">
<h2>About this app</h2>
<div class="arrow">➜</div>
</div>

<p class="about-text">
Are you struggling and short on cash?
DrutoCash can help! Get quick financial support with an easy application process and fast approval.
</p>

<div class="tag">Finance</div>

</div>

<div class="section">

<div class="section-header">
<h2>Ratings and reviews</h2>
<div class="arrow">➜</div>
</div>

<div class="rating-box">

<div class="rating-left">
<h1>4.4</h1>
<div class="stars">★★★★★</div>
</div>

<div class="rating-right">

<div class="bar-row">
<span>5</span>
<div class="bar">
<div class="fill" style="width:78%"></div>
</div>
</div>

<div class="bar-row">
<span>4</span>
<div class="bar">
<div class="fill" style="width:15%"></div>
</div>
</div>

<div class="bar-row">
<span>3</span>
<div class="bar">
<div class="fill" style="width:5%"></div>
</div>
</div>

<div class="bar-row">
<span>2</span>
<div class="bar">
<div class="fill" style="width:2%"></div>
</div>
</div>

<div class="bar-row">
<span>1</span>
<div class="bar">
<div class="fill" style="width:1%"></div>
</div>
</div>

</div>
</div>

</div>

</div>

<script>
document.querySelector(".install-btn").onclick=function(){
    this.innerText="Installed";
    this.style.background="#34A853";
}
</script>

</body>
</html>
