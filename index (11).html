<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍎আপেল পাতা হ্যাক🍏</title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .login-card, .dashboard {
            padding: 2rem 2rem 2.5rem;
        }

        .login-card {
            background: rgba(12, 18, 28, 0.95);
            border-radius: 40px;
            margin: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        h1, h2 {
            text-align: center;
            color: #FFE6B0;
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 5px #00000030;
        }

        .sub {
            text-align: center;
            color: #B9C7E6;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #E2E8FF;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: #0E1322;
            border: 1px solid #3C4A6E;
            border-radius: 28px;
            color: #FFFFFF;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #F7C35C;
            box-shadow: 0 0 0 2px rgba(247, 195, 92, 0.3);
        }

        input::placeholder {
            color: #7B8AAA;
        }

        .btn {
            background: linear-gradient(95deg, #F5B042, #FFD966);
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1C1A0E;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #2A344C;
            color: #FFE3A4;
            box-shadow: none;
            border: 1px solid #5F6F92;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .flex-btns .btn {
            margin-top: 0;
        }

        .error-msg {
            color: #FFA48E;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
            font-weight: 500;
        }

        .dashboard {
            display: none;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            margin: 40px 0 20px;
        }

        .game-card {
            background: #111827dd;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 24px 16px 28px;
            text-align: center;
            transition: all 0.25s;
            cursor: pointer;
            border: 1px solid #3C4A6E;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: #FFD966;
            background: #1E2A3F;
        }

        .game-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin: 0 auto 20px;
            background: #0B1020;
            border-radius: 28px;
            padding: 12px;
        }

        .game-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #FFE6B0;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px black;
        }

        .logout-btn {
            background: #3E2A2F;
            color: #FFBC9A;
            width: auto;
            padding: 8px 24px;
            display: inline-block;
            margin-top: 20px;
            border: 1px solid #B66F5E;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #101624;
            max-width: 460px;
            width: 90%;
            padding: 28px 24px;
            border-radius: 48px;
            border: 1px solid #FFD966;
            box-shadow: 0 25px 40px black;
        }

        .modal-content h3 {
            color: #FFE0A3;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-align: center;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #BDC7E5;
        }

        .close-modal:hover {
            color: #FFB347;
        }

        .payment-option {
            background: #1A2135;
            padding: 12px;
            border-radius: 28px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #4F6191;
            color: #E6EDFF;
            font-weight: 500;
        }

        .payment-option.selected {
            border: 2px solid #F7C35C;
            background: #2C3655;
            color: #FFF2D6;
        }

        .promo-input {
            display: flex;
            gap: 10px;
            margin: 18px 0;
        }

        .promo-input input {
            flex: 1;
            background: #0B1020;
            color: white;
        }

        .promo-input button {
            width: auto;
            padding: 0 18px;
            background: #3A4668;
            color: #FFECCC;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        #discountMessage {
            font-size: 0.85rem;
            color: #C5FFA7;
            font-weight: 500;
            margin-top: 6px;
        }

        .total-amount {
            font-size: 1.4rem;
            font-weight: bold;
            color: #FFDA88;
            margin: 15px 0;
            background: #050A15;
            padding: 8px 12px;
            border-radius: 30px;
            display: inline-block;
            width: auto;
        }

        .promo-note {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #AAB5D0;
        }

        .dashboard .sub {
            color: #C6D2F0;
        }

        @media (max-width: 650px) {
            .games-grid {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .game-name {
                font-size: 1.2rem;
            }
            .login-card, .dashboard {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- লগইন ফর্ম --> 
    <div id="loginSection" class="login-card">
        <h1>🍎আপেল পাতা হ্যাক🍏</h1>
        <div class="sub">প্রবেশ করতে ইউজারনেম ও পাসওয়ার্ড দিন</div>
        <div class="input-group">
            <label>👤 ইউজারনেম</label>
            <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="input-group">
            <label>🔒 পাসওয়ার্ড</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        <button class="btn" id="doLoginBtn">🔓 লগইন করুন</button>
        <div class="flex-btns">
            <button class="btn btn-secondary" id="openBuyModalBtn">🛒 Buy / একাউন্ট কিনুন</button>
        </div>
        <div id="loginError" class="error-msg"></div>
    </div>

    <!-- ড্যাশবোর্ড (গেম প্যানেল) -->
    <div id="dashboardSection" class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2>✨ সিগন্যাল জোন ✨</h2>
            <button id="logoutBtnMain" class="btn logout-btn" style="width: auto;">🚪 লগআউট</button>
        </div>
        <div class="games-grid" id="gamesContainer"></div>
        <div class="sub" style="margin-top: 20px;">🔔 গেমের লোগোতে ক্লিক করুন → সিগন্যাল পেজে যাবে</div>
    </div>
</div>

<!-- Buy মডাল -->
<div id="buyModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeBuyModal">&times;</span>
        <h3>🍎 নতুন একাউন্ট কিনুন</h3>
        <div class="input-group">
            <label>নতুন ইউজারনেম</label>
            <input type="text" id="newUsername" placeholder="আপনার ইচ্ছেমত ইউজার">
        </div>
        <div class="input-group">
            <label>নতুন পাসওয়ার্ড</label>
            <input type="password" id="newPassword" placeholder="পাসওয়ার্ড">
        </div>
        <div class="payment-option" id="nagadPaymentOption">
            <span>💳 Bkash Merchant Payment</span>
        </div>
        <div class="promo-input">
            <input type="text" id="promoCodeInput" placeholder="প্রোমো কোড">
            <button id="applyPromoBtn">প্রয়োগ করুন</button>
        </div>
        <div id="discountMessage"></div>
        <div class="total-amount">💰 মূল্য: ৳ <span id="displayAmount"> 1500</span></div>
        <button id="payNowFinalBtn" class="btn">💸 Pay Now</button>
    </div>
</div>

<script>
    // শুধুমাত্র একটি বৈধ লগইন অ্যাকাউন্ট
    const VALID_USER = "xm1hack";
    const VALID_PASS = "xm15022";
    
    // গেম লিস্ট
    const games = [
        { name: "HGNICE", logo: "https://bd.zenz.top/pic/dkwin.png", link: "https://bd.zenz.top/wingosignal5022.html" },
        { name: "DKWIN", logo: "https://bd.zenz.top/pic/hgnice.png", link: "https://bd.zenz.top/wingosignal5022.html" },
        { name: "TIGRO", logo: "https://bd.zenz.top/pic/tigro.png", link: "https://bd.zenz.top/wingosignal5022.html" },
        { name: "AMARCLUB", logo: "https://bd.zenz.top/pic/amarclub.png", link: "https://bd.zenz.top/wingosignal5022.html" }
    ];

    // গেম রেন্ডার
    function renderGames() {
        const container = document.getElementById("gamesContainer");
        if(!container) return;
        container.innerHTML = "";
        games.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.innerHTML = `
                <img class="game-logo" src="${game.logo}" alt="${game.name}" onerror="this.src='https://placehold.co/100x100?text=${game.name}'">
                <div class="game-name">${game.name}</div>
            `;
            card.addEventListener("click", () => {
                window.open(game.link, "_blank");
            });
            container.appendChild(card);
        });
    }

    // লগইন ভ্যালিডেশন
    function validateLogin(username, password) {
        return (username === VALID_USER && password === VALID_PASS);
    }

    // প্রোমো কোড ভেরিয়েবল
    let currentDiscountApplied = false;
    let basePrice =  1500;
    let finalPrice =  1500;

    function updatePriceDisplay() {
        document.getElementById("displayAmount").innerText = finalPrice;
    }

    function resetPromo() {
        currentDiscountApplied = false;
        finalPrice = basePrice;
        updatePriceDisplay();
        document.getElementById("discountMessage").innerHTML = "";
        document.getElementById("promoCodeInput").value = "";
    }

    // প্রোমো কোড চেক
    function applyPromoCode(code) {
        const validPromo = "BDFAST-USER-2026";
        if(code.trim() === validPromo) {
            if(!currentDiscountApplied) {
                finalPrice = basePrice - 1499;
                if(finalPrice < 0) finalPrice = 0;
                currentDiscountApplied = true;
                document.getElementById("discountMessage").innerHTML = `🎉 প্রোমো কোড সফল! আপনি ৳১৪৯৯ ডিসকাউন্ট পেলেন।`;
                updatePriceDisplay();
                return true;
            } else {
                document.getElementById("discountMessage").innerHTML = `⚠️ ডিসকাউন্ট ইতিমধ্যে প্রয়োগ করা হয়েছে!`;
                return false;
            }
        } else {
            document.getElementById("discountMessage").innerHTML = `❌ ভুল প্রোমো কোড! `;
            return false;
        }
    }

    // পেমেন্ট ফাংশন - সরাসরি লিংকে নিয়ে যাবে, লগইন পেজে না গিয়ে
    function redirectToPayment() {
        if(currentDiscountApplied) {
            window.location.href = "https://bd.kingbazar.shop/bkash/index.php";
        } else {
            window.location.href = "https://nagad.com.winxpro.top/check-out/TR0011o5Szd981777353266343GdsS";
        }
    }

    // মডাল কন্ট্রোল
    const buyModal = document.getElementById("buyModal");
    const openBtn = document.getElementById("openBuyModalBtn");
    const closeModalSpan = document.getElementById("closeBuyModal");
    const payNowBtn = document.getElementById("payNowFinalBtn");
    const applyPromoButton = document.getElementById("applyPromoBtn");
    const nagadOptionDiv = document.getElementById("nagadPaymentOption");

    function openModal() {
        resetPromo();
        document.getElementById("newUsername").value = "";
        document.getElementById("newPassword").value = "";
        buyModal.style.display = "flex";
        document.querySelectorAll(".payment-option").forEach(opt => opt.classList.remove("selected"));
        nagadOptionDiv.classList.add("selected");
    }

    function closeModal() {
        buyModal.style.display = "none";
    }

    // Pay Now এ ক্লিক করলে - ইউজারনেম/পাসওয়ার্ড কিছুই চেক করবে না
    // সরাসরি পেমেন্ট লিংকে নিয়ে যাবে (লগইন পেজে ফিরে না গিয়ে)
    function handlePayNow() {
        // কোনো চেকিং বা স্টোরেজ ছাড়াই সরাসরি রিডাইরেক্ট
        redirectToPayment();
        // মডাল বন্ধ করার প্রয়োজন নেই কারণ পুরো পেজ রিডাইরেক্ট হবে
    }

    // পেজ লোড হলে
    window.onload = () => {
        renderGames();

        // লগইন বাটন ইভেন্ট
        const loginBtn = document.getElementById("doLoginBtn");
        const loginUserInput = document.getElementById("loginUsername");
        const loginPassInput = document.getElementById("loginPassword");
        const loginErrorSpan = document.getElementById("loginError");
        const loginSection = document.getElementById("loginSection");
        const dashboardSection = document.getElementById("dashboardSection");

        function attemptLogin() {
            const user = loginUserInput.value.trim();
            const pass = loginPassInput.value;
            if(validateLogin(user, pass)) {
                loginErrorSpan.innerText = "";
                loginSection.style.display = "none";
                dashboardSection.style.display = "block";
                renderGames();
            } else {
                loginErrorSpan.innerText = "⛔ ভুল ইউজারনাম বা পাসওয়ার্ড।";
            }
        }

        loginBtn.addEventListener("click", attemptLogin);
        [loginUserInput, loginPassInput].forEach(inp => inp.addEventListener("keypress", (e) => {
            if(e.key === "Enter") attemptLogin();
        }));

        // লগআউট বাটন
        const logoutBtn = document.getElementById("logoutBtnMain");
        if(logoutBtn) {
            logoutBtn.onclick = () => {
                loginSection.style.display = "block";
                dashboardSection.style.display = "none";
                loginUserInput.value = "";
                loginPassInput.value = "";
                loginErrorSpan.innerText = "";
            };
        }

        // Buy মডাল ইভেন্ট
        openBtn.addEventListener("click", openModal);
        closeModalSpan.addEventListener("click", closeModal);
        window.addEventListener("click", (e) => {
            if(e.target === buyModal) closeModal();
        });

        // প্রোমো কোড প্রয়োগ
        applyPromoButton.addEventListener("click", () => {
            const code = document.getElementById("promoCodeInput").value;
            applyPromoCode(code);
        });

        // Pay Now বাটন - ইউজারনেম/পাসওয়ার্ড যাই থাকুক না কেন, সাথে সাথেই রিডাইরেক্ট
        payNowBtn.addEventListener("click", (e) => {
            e.preventDefault();
            handlePayNow();
        });

        // Nagad সিলেক্টেড রাখা
        nagadOptionDiv.addEventListener("click", () => {
            document.querySelectorAll(".payment-option").forEach(opt => opt.classList.remove("selected"));
            nagadOptionDiv.classList.add("selected");
        });
        nagadOptionDiv.classList.add("selected");

        // শুরুতে লগইন পেজ দেখাবে
        loginSection.style.display = "block";
        dashboardSection.style.display = "none";
    };
</script>
</body>
</html>
